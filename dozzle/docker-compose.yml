version: "3"
services:
  dozzle:
    image: amir20/dozzle:latest@sha256:4ce6ccd57f1146f592c04c4b0f9a1fbb74f7aa4305ab2c6629f2ec9147e08a3d
    container_name: dozzle
    environment:
      - DOZZLE_AUTH_PROVIDER=simple
    ports:
      - "14000:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config:/data
    labels:
      - com.centurylinklabs.watchtower.enable=true