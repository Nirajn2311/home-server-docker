version: "3"
services:
  dozzle:
    image: amir20/dozzle:latest@sha256:c4600064115a9be914ad775f6bbd15fb96585579ac85d04967b4fec2f807ca1b
    container_name: dozzle
    environment:
      - DOZZLE_AUTH_PROVIDER=simple
    ports:
      - "14000:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config:/data
    labels:
      - com.centurylinklabs.watchtower.enable=true