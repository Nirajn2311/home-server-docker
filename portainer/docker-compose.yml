version: "3"
services:
  portainer-ce:
    image: portainer/portainer-ce:2.38.1@sha256:3ffd8daa77bf32a4afdabe1708fb20790a1675e519b2fe2dfaa4d08154f5b1f0
    container_name: portainer
    restart: unless-stopped
    ports:
      - "8000:8000"
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /run/user/1001/docker.sock:/var/run/docker-1001.sock
      - portainer_data:/data
    labels:
      - com.centurylinklabs.watchtower.enable=true

volumes:
  portainer_data:
