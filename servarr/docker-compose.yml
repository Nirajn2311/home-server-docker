services:
  gluetun:
    image: qmcgaw/gluetun:v3.41.1@sha256:1a5bf4b4820a879cdf8d93d7ef0d2d963af56670c9ebff8981860b6804ebc8ab
    container_name: gluetun
    restart: unless-stopped
    env_file: .env
    ports:
      - "18900:18900" # qbittorrent
      - "18800:9696" # prowlarr
      - "18850:8191" # flaresolverr
    cap_add:
      - NET_ADMIN
    volumes:
      - ./gluetun-config:/gluetun
    devices:
      - /dev/net/tun:/dev/net/tun

  qbittorrent:
    image: linuxserver/qbittorrent:5.2.2@sha256:abbf2aeeb58b641977a012d0ab69939eb277cb827078450b142f782b1cd6893c
    container_name: qbittorrent
    network_mode: service:gluetun
    restart: unless-stopped
    env_file: .env
    mem_limit: 500m
    memswap_limit: 1g
    environment:
      - WEBUI_PORT=18900
    volumes:
      - ./qbit-config:/config
      - ${DATA_DIR}:/data/source

  qbit-ui:
    image: ghcr.io/autobrr/qui:v1.20.0@sha256:946e96a158d847a01b5d0055aeadfc1998fff021974d0d5b1e61ccd7fb199450
    container_name: qbit-ui
    restart: unless-stopped
    ports:
      - "18950:7476"
    volumes:
      - ./qui-config:/config
    depends_on:
      - qbittorrent

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:v3.5.0@sha256:139dfee1c6f89249c8d665d1333a42e8ec74ec0a86bc6bb1c8461e10d3a66a47
    container_name: flaresolverr
    restart: unless-stopped
    env_file: .env
    network_mode: service:gluetun

  prowlarr:
    image: ghcr.io/hotio/prowlarr:release-2.4.0.5397@sha256:2cf9c6431d99947a33095cf2bf159fe8322ecb1ebeb78ba32443cc2f0ec8dc84
    container_name: prowlarr
    restart: unless-stopped
    env_file: .env
    network_mode: service:gluetun
    volumes:
      - ./prowlarr-config:/config
    depends_on:
      - flaresolverr

  radarr:
    image: ghcr.io/hotio/radarr:release-6.2.1.10461@sha256:1dae87d74a7356260a5d3b379adc21c8bc0543763a5ff95dd1e0793225f9d06c
    container_name: radarr
    restart: unless-stopped
    env_file: .env
    ports:
      - "18100:7878"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./radarr-config:/config
      - ${DATA_DIR}:/data/source
      - ${MEDIA_DIR}:/data/media
    depends_on:
      - gluetun
      - qbittorrent
      - prowlarr

  sonarr:
    image: ghcr.io/hotio/sonarr:release-4.0.17.2952@sha256:d1333b06ea05f8f36f89c2302f9bb7ff6bf666c0cf86d3d7c11d9fde9c9c4729
    container_name: sonarr
    restart: unless-stopped
    env_file: .env
    ports:
      - "18000:8989"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./sonarr-config:/config
      - ${DATA_DIR}:/data/source
      - ${MEDIA_DIR}:/data/media
    depends_on:
      - gluetun
      - qbittorrent
      - prowlarr

  bazarr:
    image: ghcr.io/hotio/bazarr:release-v1.5.6@sha256:8b4564c32a2c44d6c7a9b50762ba4daf3da1264bd7bcba2df311fb7cd8ce6fba
    container_name: bazarr
    restart: unless-stopped
    logging:
      driver: json-file
    env_file: .env
    ports:
      - "18500:6767"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./bazarr-config:/config
      - ${MEDIA_DIR}:/data/media
    depends_on:
      - gluetun
      - qbittorrent
      - prowlarr
