services:
  gluetun:
    image: qmcgaw/gluetun:v3.41.1@sha256:1a5bf4b4820a879cdf8d93d7ef0d2d963af56670c9ebff8981860b6804ebc8ab
    container_name: gluetun
    restart: unless-stopped
    env_file: .env
    ports:
      - "18900:18900" # qbittorrent
      - "18800:9696" # prowlarr
      - "18850:8191" # flaresolverr
    cap_add:
      - NET_ADMIN
    volumes:
      - ./gluetun-config:/gluetun
    devices:
      - /dev/net/tun:/dev/net/tun

  qbittorrent:
    image: linuxserver/qbittorrent:5.1.0@sha256:3e87e9b74716ec1f104dbd3e67d18594dc6b920a757cd7377e35b2776b26e30d
    container_name: qbittorrent
    network_mode: service:gluetun
    restart: unless-stopped
    env_file: .env
    mem_limit: 500m
    memswap_limit: 1g
    environment:
      - WEBUI_PORT=18900
    volumes:
      - ./qbit-config:/config
      - ${DATA_DIR}:/data/source

  qbit-ui:
    image: ghcr.io/autobrr/qui:v1.15.0@sha256:da33f8c850f7d6f1bfaee26b9553b21411e872639d54193906fa2cec51af1d0f
    container_name: qbit-ui
    restart: unless-stopped
    ports:
      - "18950:7476"
    volumes:
      - ./qui-config:/config
    depends_on:
      - qbittorrent

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:v3.4.6@sha256:7962759d99d7e125e108e0f5e7f3cdbcd36161776d058d1d9b7153b92ef1af9e
    container_name: flaresolverr
    restart: unless-stopped
    env_file: .env
    network_mode: service:gluetun

  prowlarr:
    image: ghcr.io/hotio/prowlarr:release-1.37.0.5076@sha256:7b6aa71b3aab19ebd287ddeebe012a94824eeddad8913b3d5defdfac7b8c6af7
    container_name: prowlarr
    restart: unless-stopped
    env_file: .env
    network_mode: service:gluetun
    volumes:
      - ./prowlarr-config:/config
    depends_on:
      - flaresolverr

  radarr:
    image: ghcr.io/hotio/radarr:release-5.26.2.10099@sha256:7f583b35dca64c1bffd27a39d61d4c3143633a29070260f76f1e5939006780d8
    container_name: radarr
    restart: unless-stopped
    env_file: .env
    ports:
      - "18100:7878"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./radarr-config:/config
      - ${DATA_DIR}:/data/source
      - ${MEDIA_DIR}:/data/media
    depends_on:
      - gluetun
      - qbittorrent
      - prowlarr

  sonarr:
    image: ghcr.io/hotio/sonarr:release-4.0.15.2941@sha256:ce095ff23043fe1397ac663d7d0885fbabdce9809257931ae9646c04d89567e8
    container_name: sonarr
    restart: unless-stopped
    env_file: .env
    ports:
      - "18000:8989"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./sonarr-config:/config
      - ${DATA_DIR}:/data/source
      - ${MEDIA_DIR}:/data/media
    depends_on:
      - gluetun
      - qbittorrent
      - prowlarr

  bazarr:
    image: ghcr.io/hotio/bazarr:release-1.5.5@sha256:7381c8a3f3de2361a7ea47492093b6680e4d38ef7b0d21748f2ade481eaea378
    container_name: bazarr
    restart: unless-stopped
    logging:
      driver: json-file
    env_file: .env
    ports:
      - "18500:6767"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./bazarr-config:/config
      - ${MEDIA_DIR}:/data/media
    depends_on:
      - gluetun
      - qbittorrent
      - prowlarr
