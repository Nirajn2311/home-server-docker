version: "3"
services:
  heimdall:
    image: linuxserver/heimdall:2.7.6@sha256:7a32a03c70fe0e17211520e87e956b99a13436832323487fc2ff8b3c7f1c1ebf
    container_name: heimdall
    restart: always
    environment:
      - PGID=1000
      - PUID=1000
    ports:
      - "9000:443"
    volumes:
      - ./config:/config
    labels:
      - com.centurylinklabs.watchtower.enable=true
