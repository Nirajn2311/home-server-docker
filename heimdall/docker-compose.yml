version: "3"
services:
  heimdall:
    image: linuxserver/heimdall:2.7.0@sha256:5f87801d45959497d9046449bf42abede34a688444c0742d8198a9fd50a256db
    container_name: heimdall
    restart: always
    environment:
      - PGID=1000
      - PUID=1000
    ports:
      - "9000:443"
    volumes:
      - ./config:/config
    labels:
      - com.centurylinklabs.watchtower.enable=true
