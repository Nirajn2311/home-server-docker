version: "3"
services:
  heimdall:
    image: linuxserver/heimdall:2.7.6@sha256:eca08f3e01ad506b58d35195c50859c15fa83e56f3f20b211defcc1438b01ecf
    container_name: heimdall
    restart: always
    environment:
      - PGID=1000
      - PUID=1000
    ports:
      - "9000:443"
    volumes:
      - ./config:/config
    labels:
      - com.centurylinklabs.watchtower.enable=true
