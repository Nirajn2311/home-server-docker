version: "3"
services:
  heimdall:
    image: linuxserver/heimdall:2.7.6@sha256:7047babdc17f9ea5dc20fecf7540bfe142e0baefa418515d6052c1def4b99725
    container_name: heimdall
    restart: always
    environment:
      - PGID=1000
      - PUID=1000
    ports:
      - "9000:443"
    volumes:
      - ./config:/config
    labels:
      - com.centurylinklabs.watchtower.enable=true
