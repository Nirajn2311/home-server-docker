version: "3"
services:
  heimdall:
    image: linuxserver/heimdall:2.7.4@sha256:bfc009ffa8de177e5c731dfa45c08bdba1c3b0679b0d672dc6cd7379dd89ab08
    container_name: heimdall
    restart: always
    environment:
      - PGID=1000
      - PUID=1000
    ports:
      - "9000:443"
    volumes:
      - ./config:/config
    labels:
      - com.centurylinklabs.watchtower.enable=true
