version: "3"
services:
  heimdall:
    image: linuxserver/heimdall:2.7.6@sha256:3f6905759c029b3223fb4f2ad2bce67e97fb24f571acade1bbebb69e6d57e083
    container_name: heimdall
    restart: always
    environment:
      - PGID=1000
      - PUID=1000
    ports:
      - "9000:443"
    volumes:
      - ./config:/config
    labels:
      - com.centurylinklabs.watchtower.enable=true
