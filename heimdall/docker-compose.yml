version: "3"
services:
  heimdall:
    image: linuxserver/heimdall:2.7.6@sha256:0f1b3b126750b0d67a06507bce2bd340c058c037aeee0393bb9bbb2383e1f212
    container_name: heimdall
    restart: always
    environment:
      - PGID=1000
      - PUID=1000
    ports:
      - "9000:443"
    volumes:
      - ./config:/config
    labels:
      - com.centurylinklabs.watchtower.enable=true
