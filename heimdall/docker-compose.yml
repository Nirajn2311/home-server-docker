version: "3"
services:
  heimdall:
    image: linuxserver/heimdall:2.7.6@sha256:fcf8f7ba2b7a92bad9a1c3e2da3e99904799e51847e6baf0d14c66966653f21d
    container_name: heimdall
    restart: always
    environment:
      - PGID=1000
      - PUID=1000
    ports:
      - "9000:443"
    volumes:
      - ./config:/config
    labels:
      - com.centurylinklabs.watchtower.enable=true
