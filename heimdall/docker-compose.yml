version: "3"
services:
  heimdall:
    image: linuxserver/heimdall:2.7.6@sha256:e9de877a7da44c59ae252e880fdaae52a8cb08fbdf2e04057ed4de0205b1948a
    container_name: heimdall
    restart: always
    environment:
      - PGID=1000
      - PUID=1000
    ports:
      - "9000:443"
    volumes:
      - ./config:/config
    labels:
      - com.centurylinklabs.watchtower.enable=true
