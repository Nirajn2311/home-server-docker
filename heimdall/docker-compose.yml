version: "3"
services:
  heimdall:
    image: linuxserver/heimdall:2.7.6@sha256:80071b6192987d5c1a5c47a719bcc49fcdb8430249ce11ad01d5f1e9d7b7dd67
    container_name: heimdall
    restart: always
    environment:
      - PGID=1000
      - PUID=1000
    ports:
      - "9000:443"
    volumes:
      - ./config:/config
    labels:
      - com.centurylinklabs.watchtower.enable=true
