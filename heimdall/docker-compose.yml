version: "3"
services:
  heimdall:
    image: linuxserver/heimdall:2.7.6@sha256:d4348138bab1450222655763193245d956069d4f73f4b67e40ba9d655a5b841d
    container_name: heimdall
    restart: always
    environment:
      - PGID=1000
      - PUID=1000
    ports:
      - "9000:443"
    volumes:
      - ./config:/config
    labels:
      - com.centurylinklabs.watchtower.enable=true
