version: "3"
services:
  heimdall:
    image: linuxserver/heimdall:2.7.3@sha256:e51388a981a65d5bc18f229aa17c1c38ed2e63c77fb612e965428f0b17e8cf88
    container_name: heimdall
    restart: always
    environment:
      - PGID=1000
      - PUID=1000
    ports:
      - "9000:443"
    volumes:
      - ./config:/config
    labels:
      - com.centurylinklabs.watchtower.enable=true
