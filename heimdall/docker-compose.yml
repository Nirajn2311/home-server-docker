version: "3"
services:
  heimdall:
    image: linuxserver/heimdall:2.6.3@sha256:aefaf6ffc2f3925f09b2b898b1544ed58cc5f4b504f3163865c80afae78b4fe2
    container_name: heimdall
    restart: always
    environment:
      - PGID=1000
      - PUID=1000
    ports:
      - "9000:443"
    volumes:
      - ./config:/config
    labels:
      - com.centurylinklabs.watchtower.enable=true
