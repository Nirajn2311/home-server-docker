version: "3"
services:
  heimdall:
    image: linuxserver/heimdall:2.6.3@sha256:cd44a6d1a3b5ed271ea0c3d5da657343072cfd95610addaab1f7e27298be7406
    container_name: heimdall
    restart: always
    environment:
      - PGID=1000
      - PUID=1000
    ports:
      - "9000:443"
    volumes:
      - ./config:/config
    labels:
      - com.centurylinklabs.watchtower.enable=true
