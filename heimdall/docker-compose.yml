version: "3"
services:
  heimdall:
    image: linuxserver/heimdall:2.7.6@sha256:4d6ac6deb2530e2d7466c45850a62cc68729de5faf285d9f7f44151c66619566
    container_name: heimdall
    restart: always
    environment:
      - PGID=1000
      - PUID=1000
    ports:
      - "9000:443"
    volumes:
      - ./config:/config
    labels:
      - com.centurylinklabs.watchtower.enable=true
