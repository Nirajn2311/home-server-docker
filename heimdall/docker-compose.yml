version: "3"
services:
  heimdall:
    image: linuxserver/heimdall:2.7.6@sha256:d992875cb63c643ed5c8c450fb96f0ed112444c349a4845e043c2341142e17db
    container_name: heimdall
    restart: always
    environment:
      - PGID=1000
      - PUID=1000
    ports:
      - "9000:443"
    volumes:
      - ./config:/config
    labels:
      - com.centurylinklabs.watchtower.enable=true
